<!DOCTYPE html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sistema de punto de venta para tienda retail — gestión de ventas, productos, reportes y devoluciones." />
    <title>POS Retail — Sistema de Punto de Venta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles/tokens.css" />
    <link rel="stylesheet" href="/src/styles/base.css" />
    <link rel="stylesheet" href="/src/styles/components.css" />
    <link rel="stylesheet" href="/src/styles/pages.css" />
  </head>
  <body>
    <div id="app">
      <div id="app-loading" class="app-loading">
        <div class="loading-logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="48" height="48" rx="12" fill="url(#logoGrad)"/>
            <path d="M14 16h20M14 24h14M14 32h8" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="35" cy="32" r="5" fill="white" fill-opacity="0.9"/>
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
                <stop stop-color="#6c63ff"/>
                <stop offset="1" stop-color="#4f46e5"/>
              </linearGradient>
            </defs>
          </svg>
          <span>POS Retail</span>
        </div>
        <div class="loading-spinner"></div>
      </div>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <div id="modal-overlay" class="modal-overlay hidden"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
