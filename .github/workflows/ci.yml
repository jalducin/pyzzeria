name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
      - 'sprint/**'

jobs:
  test:
    name: Tests + Swagger check
    runs-on: ubuntu-latest

    env:
      ORDERS_TABLE: test-orders
      WS_CONNECTIONS_TABLE: test-ws-connections
      STATE_MACHINE_ARN: ""
      AWS_DEFAULT_REGION: us-east-2
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements-dev.txt

      - name: Ejecutar pruebas unitarias (moto)
        run: pytest --tb=short --cov=backend --cov-report=term-missing -q

      - name: Verificar que Swagger está accesible
        run: |
          python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl -f http://localhost:8000/openapi.json || (echo "ERROR: /openapi.json no accesible" && exit 1)
          curl -f http://localhost:8000/docs        || (echo "ERROR: /docs no accesible" && exit 1)
          echo "Swagger OK"
