schema: spec-driven

# ---------------------------------------------------------------------------
# Contexto del proyecto (RELLENAR al instanciar la plantilla)
# Este bloque se muestra a la IA al crear cualquier artefacto OpenSpec.
# Sustituye los placeholders <...> por la información real del proyecto.
# Sirve para cualquier stack (Python, PHP, React, n8n, etc.).
# ---------------------------------------------------------------------------
context: |
  Stack tecnológico: Python 3.12, FastAPI + Mangum, DynamoDB (boto3), AWS Lambda, API Gateway HTTP + WebSocket, Step Functions Express, S3 + CloudFront, SAM IaC, JS vainilla.
  Arquitectura: serverless — Lambda + Mangum (FastAPI), DynamoDB on-demand, WebSocket push via Step Functions, frontend estático en S3/CloudFront.
  Dominio: Pyzzeria — demo de pedidos de pizza serverless en AWS Free Tier para portafolio. Visitante elige tamaño y toppings, crea pedido, ve tracker en tiempo real ~70s.
  Idioma: documentación y comentarios en español; identificadores de código según convención del lenguaje.
  Control de versiones: conventional commits.
  Ramas: feature/[spec] → sprint/YYYY-NN → main.

  Estándares del proyecto (fuente única de verdad): toda creación e implementación de
  artefactos DEBE seguir el contexto técnico en docs/. Leer y aplicar:
  - docs/base-standards.md — principios base, idioma, skills, planificación y reglas OpenSpec.
  - docs/golden-rules.md — REGLAS DE ORO (no negociables): Swagger obligatorio en todo servicio, autenticación JWT en endpoints protegidos, tests unitarios por cada escenario del spec.
  - docs/git-standards.md — estrategia de ramas por sprint (feature→sprint→main), flujo de PR y protección de main.
  - docs/documentation-standards.md — estructura y mantenimiento de la documentación.

  Flujo de ramas: feature/[spec] → sprint/YYYY-NN → main (solo via PR con CI verde).
  CI: .github/workflows/ci.yml — ejecuta pytest + verifica /openapi.json y /docs antes de permitir merge.

  Para implementar: adopta el agente relevante de ai-specs/agents/ según el tipo de cambio.

# ---------------------------------------------------------------------------
# Reglas por artefacto (agnósticas de tecnología)
# ---------------------------------------------------------------------------
rules:
  _global:
    - Antes de crear cualquier artefacto, leer y aplicar docs/base-standards.md
    - Leer y aplicar docs/golden-rules.md en cada implementación (Swagger + auth + tests)
    - Leer y aplicar docs/git-standards.md para toda operación de ramas y merge
    - Mantener consistencia con los specs existentes en openspec/specs/

  tasks:
    - Dividir las tareas en bloques de máximo 2 horas
    - El primer paso (Step 0) SIEMPRE es crear la feature branch
    - Toda lista de tareas debe incluir los pasos obligatorios definidos en
      .claude/rules/openspec-tasks-mandatory-steps.md (rama, pruebas, verificación manual, documentación)

  spec:
    - Definir QUÉ debe hacer el sistema en términos de requisitos y escenarios verificables
    - Cada capability nueva genera un specs/<nombre>/spec.md en kebab-case

  design:
    - Documentar el CÓMO: decisiones técnicas, alternativas consideradas y trade-offs
    - Incluir solo lo necesario para implementar sin ambigüedad
